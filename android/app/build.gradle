apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")

react {
    // React Native configuration - defaults are fine
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.biniq"
    defaultConfig {
        applicationId "com.biniq"
        multiDexEnabled true
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        missingDimensionStrategy 'react-native-camera', 'general'
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // ✅ FIX: Exclude duplicate classes that cause DEX merge failure
    configurations.all {
        resolutionStrategy {
            // Force consistent multidex version
            force 'androidx.multidex:multidex:2.0.1'
        }
        // ✅ Exclude listenablefuture — bundled in both GMS and Guava, causes duplicates
        exclude group: 'com.google.guava', module: 'listenablefuture'
        // ✅ Exclude Fresco from react-android — we remove our manual ones below
        // React Native ships its own Fresco version; adding it again = duplicate classes
        exclude group: 'com.facebook.fresco', module: 'fresco'
        exclude group: 'com.facebook.fresco', module: 'animated-gif'
        exclude group: 'com.facebook.fresco', module: 'animated-base'
        exclude group: 'com.facebook.fresco', module: 'animated-drawable'
        exclude group: 'com.facebook.fresco', module: 'imagepipeline'
        exclude group: 'com.facebook.fresco', module: 'imagepipeline-base'
        exclude group: 'com.facebook.fresco', module: 'drawee'
        exclude group: 'com.facebook.fresco', module: 'ui-common'
    }
}

dependencies {
    // React Native — ships with its own Fresco internally, do NOT add Fresco separately
    implementation("com.facebook.react:react-android")

    // ✅ REMOVED: These were causing duplicate DEX classes with RN's bundled Fresco:
    //   implementation 'com.facebook.fresco:fresco:3.1.3'        ← DUPLICATE
    //   implementation 'com.facebook.fresco:animated-gif:3.1.3'  ← DUPLICATE

    // MultiDex
    implementation 'androidx.multidex:multidex:2.0.1'

    // Google Play Services
    implementation 'com.google.android.gms:play-services-base:18.0.1'
    implementation 'com.google.android.gms:play-services-location:19.0.1'
    implementation 'com.google.android.gms:play-services-maps:18.0.2'

    // React Native Camera
    implementation project(':react-native-camera')

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)